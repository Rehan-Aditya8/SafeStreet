<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Login - Road Damage Detection</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            color: var(--text-main);
        }

        .login-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .badge-official {
            background: #f1f5f9;
            color: #475569;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: inline-block;
            border: 1px solid var(--border);
            letter-spacing: 0.1em;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        /* Override shared form styles for better fit */
        .form-input {
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            color: #0f172a !important;
            border-radius: 12px !important;
        }

        .form-input:focus {
            border-color: #3b82f6 !important;
            background: #ffffff !important;
        }

        .btn-primary {
            background: #0f172a !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 1rem !important;
            font-weight: 600 !important;
        }

        .btn-primary:hover {
            background: #1e293b !important;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <span class="badge-official">AUTHORIZED PERSONNEL ONLY</span>
            <h1>Official Login</h1>
            <p>Government Infrastructure Portal</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Department Email</label>
                <input type="email" class="form-input" required placeholder="name@dept.gov.in">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="password-container">
                    <input type="password" class="form-input password-input" id="passwordInput" required
                        placeholder="Enter officer password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('passwordInput')">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Authenticate</button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="register.html" style="color: #0d6efd; text-decoration: none; font-size: 0.9rem;">New Official?
                Create Account</a>
        </div>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script src="../shared/modal.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.querySelector('input[type="email"]').value;
            const password = document.getElementById('passwordInput').value;

            try {
                await Auth.login(email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                if (window.showModal) showModal('Login Failed', error.message);
                else alert(error.message);
            }
        }
    </script>
</body>

</html>
