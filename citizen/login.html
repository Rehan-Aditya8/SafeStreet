<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - Road Damage Detection</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f4f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            padding: 2.5rem 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: none;
            box-sizing: border-box;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            width: 48px;
            height: 48px;
            background-color: #eff6ff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            color: #3b82f6;
        }

        .login-icon svg {
            width: 24px;
            height: 24px;
        }

        .login-header h1 {
            color: #111827;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 0.75rem 0;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.875rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .form-label {
            color: #374151;
            font-size: 0.875rem;
            font-weight: 600;
            display: block;
        }

        /* For labels not in a container */
        .form-group>.form-label {
            margin-bottom: 0.5rem;
        }

        .forgot-link {
            color: #3b82f6;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            border-radius: 8px;
            color: #111827;
            font-size: 0.875rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #6b7280;
        }

        .btn-primary {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .create-account {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #6b7280;
        }

        .create-account a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .divider {
            border: 0;
            border-top: 1px solid #f3f4f6;
            margin: 1.5rem 0;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .back-link:hover {
            color: #374151;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M17 11V3H7v4H3v14h8v-4h2v4h8V11h-4zM7 19H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5V9h2v2zm4 4H9v-2h2v2zm0-4H9V9h2v2zm0-4H9V5h2v2zm4 8h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2zm4 12h-2v-2h2v2zm0-4h-2v-2h2v2z" />
                </svg>
            </div>
            <h1>Citizen Login</h1>
            <p>Sign in to report and track road infrastructure issues</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">Email or Mobile</label>
                <input type="text" class="form-input" required placeholder="name@example.com or 10-digit mobile">
            </div>
            <div class="form-group">
                <div class="form-label-container">
                    <label class="form-label">Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <div class="password-container">
                    <input type="password" class="form-input password-input" id="passwordInput" required
                        placeholder="Enter your password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('passwordInput')">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="create-account">
            New Citizen? <a href="register.html">Create Account</a>
        </div>
        <hr class="divider">
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script src="../shared/modal.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.querySelector('input[type="text"]').value;
            const password = document.getElementById('passwordInput').value;

            try {
                await Auth.login(email, password, 'citizen');
                window.location.href = 'dashboard.html';
            } catch (error) {
                // Use modal if available, fallback to alert
                if (window.showModal) showModal('Login Failed', error.message);
                else alert(error.message);
            }
        }
    </script>
</body>

</html>
